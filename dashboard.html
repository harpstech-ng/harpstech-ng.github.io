<html lang="en">
<head>

<link rel="manifest" href="manifest.json">

<style>
:root{
  --green:#00D084;
  --green-glow:rgba(0,208,132,0.3);
  --bg:#0A0A0F;
  --card:rgba(255,255,255,0.03);
  --card-hover:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.08);
  --text-muted:#8A8A9E;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:
    radial-gradient(1200px 700px at 50% -15%, rgba(0,208,132,0.18), transparent 60%),
    radial-gradient(900px 500px at 90% 100%, rgba(138,43,226,0.1), transparent 50%),
    var(--bg);
  color:white;
  font-family:'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
  padding:24px 16px 40px;
  min-height:100vh;
}
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:32px;
  padding:16px 0;
  backdrop-filter:blur(20px);
}
.logo-wrap{
  display:flex;
  align-items:center;
  gap:12px;
}
.logo{
  width:40px;
  height:40px;
  border-radius:12px;
  box-shadow:0 8px 24px rgba(0,208,132,0.25);
}
.logo-text{
  font-weight:700;
  font-size:20px;
  background:linear-gradient(135deg, #fff 30%, #8A8A9E);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.user-info{
  text-align:right;
}
.username{
  font-size:14px;
  font-weight:600;
  color:white;
}
.team{
  font-size:11px;
  color:var(--text-muted);
  font-weight:500;
  display:flex;
  align-items:center;
  gap:6px;
  justify-content:flex-end;
  margin-top:2px;
}
.team-dot{
  width:6px;
  height:6px;
  background:var(--green);
  border-radius:50%;
  box-shadow:0 0 10px var(--green-glow);
  animation:pulse-dot 2s infinite;
}
@keyframes pulse-dot{
 0%,100%{opacity:1}
 50%{opacity:0.4}
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 14px;
  border-radius:999px;
  background:linear-gradient(135deg, rgba(0,208,132,0.15), rgba(0,208,132,0.05));
  border:1px solid rgba(0,208,132,0.2);
  color:var(--green);
  font-size:12px;
  font-weight:600;
  margin-bottom:20px;
  backdrop-filter:blur(10px);
}
.badge svg{width:14px;height:14px}
h2{
  font-size:28px;
  font-weight:700;
  margin-bottom:8px;
  background:linear-gradient(135deg, #fff 30%, #8A8A9E);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.sub{
  color:var(--text-muted);
  font-size:14px;
  margin-bottom:28px;
  font-weight:400;
}
.card{
  background:var(--card);
  border:1px solid var(--border);
  padding:24px;
  border-radius:20px;
  margin-bottom:20px;
  backdrop-filter:blur(20px);
  transition:all 0.3s ease;
}
.card:hover{
  background:var(--card-hover);
  border-color:rgba(0,208,132,0.2);
  transform:translateY(-2px);
}
.card h3{
  color:var(--green);
  font-size:13px;
  font-weight:600;
  margin-bottom:20px;
  text-transform:uppercase;
  letter-spacing:0.5px;
}
.success-card{
  background:linear-gradient(135deg, rgba(0,208,132,0.12), rgba(0,208,132,0.03));
  border:1px solid rgba(0,208,132,0.25);
}
.success-icon{
  width:70px;
  height:70px;
  margin:0 auto 20px;
  background:linear-gradient(135deg, var(--green), #00A866);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:36px;
  box-shadow:0 10px 40px rgba(0,208,132,0.4);
  animation:success-bounce 0.6s ease;
}
@keyframes success-bounce{
  0%{transform:scale(0)}
  50%{transform:scale(1.1)}
  100%{transform:scale(1)}
}
.big-amount{
  font-size:44px;
  font-weight:700;
  color:white;
  text-align:center;
  margin:12px 0 8px;
  letter-spacing:-1px;
}
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:14px 0;
  font-size:15px;
}
.row.label{color:var(--text-muted)}
.row.value{font-weight:600}
.voice-quote{
  font-style:italic;
  color:#C8C8D0;
  font-size:14px;
  text-align:center;
  margin:20px 0;
  padding:16px;
  background:rgba(0,208,132,0.08);
  border-radius:14px;
  border:1px solid rgba(0,208,132,0.2);
  line-height:1.5;
}
.btn{
  width:100%;
  padding:17px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg, var(--green), #00A866);
  color:#000;
  font-weight:700;
  font-size:16px;
  margin-top:14px;
  cursor:pointer;
  transition:all 0.2s ease;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  box-shadow:0 10px 30px rgba(0,208,132,0.3);
  font-family:'Space Grotesk', sans-serif;
}
.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 15px 40px rgba(0,208,132,0.4);
}
.btn:active{transform:scale(0.98)}
.btn-secondary{
  background:var(--card);
  color:white;
  border:1px solid var(--border);
  box-shadow:none;
  backdrop-filter:blur(10px);
}
.btn-secondary:hover{
  background:var(--card-hover);
  border-color:rgba(0,208,132,0.3);
}
.btn svg{width:20px;height:20px}
.history-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 0;
  border-bottom:1px solid var(--border);
  transition:all 0.2s ease;
}
.history-item:last-child{border-bottom:none}
.history-item:hover{
  background:rgba(255,255,255,0.02);
  margin:0 -24px;
  padding:16px 24px;
  border-radius:12px;
}
.history-left{
  display:flex;
  align-items:center;
  gap:14px;
  flex:1;
}
.history-icon{
  width:44px;
  height:44px;
  border-radius:12px;
  background:linear-gradient(135deg, rgba(0,208,132,0.2), rgba(0,208,132,0.1));
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}
.history-details h4{
  font-size:15px;
  font-weight:600;
  margin-bottom:4px;
}
.history-details p{
  font-size:12px;
  color:var(--text-muted);
}
.history-amount{
  text-align:right;
}
.history-amount.amount{
  font-size:17px;
  font-weight:700;
  color:white;
}
.history-amount.time{
  font-size:11px;
  color:var(--text-muted);
  margin-top:4px;
}
.empty{
  text-align:center;
  color:var(--text-muted);
  font-size:14px;
  padding:40px 0;
}
.footer{
  text-align:center;
  margin-top:32px;
  font-size:12px;
  color:var(--text-muted);
}
.student-badge-dash{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 16px;
  background:rgba(255,149,0,0.15);
  border:1px solid rgba(255,149,0,0.3);
  color:#ff9500;
  border-radius:999px;
  font-size:13px;
  font-weight:600;
  margin-bottom:20px;
  backdrop-filter:blur(10px);
}
.voice-active{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:6px 14px;
  background:rgba(0,208,132,0.1);
  border:1px solid rgba(0,208,132,0.2);
  color:var(--green);
  border-radius:999px;
  font-size:12px;
  font-weight:600;
  backdrop-filter:blur(10px);
}
.voice-active svg{width:14px;height:14px}
.loading{
  text-align:center;
  padding:40px 0;
  color:var(--text-muted);
}
.spinner{
  width:20px;
  height:20px;
  border:3px solid var(--border);
  border-top-color:var(--green);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  margin:0 auto 12px;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="top">
  <div class="logo-wrap">
    <img src="IMG_6416.jpeg" class="logo" alt="VoicePay" onerror="this.style.display='none'">
    <span class="logo-text">VoicePay</span>
  </div>
  <div class="user-info">
    <div class="username" id="userName">Loading...</div>
    <div class="team">
      <span class="team-dot"></span>
      VoicePay Team
    </div>
  </div>
</div>

<span class="badge">
  <svg fill="currentColor" viewBox="0 0 20 20"><path d="M10 2L3 7v11a1 1 0 001 1h12a1 1 0 001-1V7l-7-5z"/></svg>
  Powered by Opay
</span>

<h2>Payment Successful</h2>

  🎓 Student Account - ₦10,000 daily limit

<div class="card success-card" id="receiptCard" style="display:none">
  <div class="success-icon">✓</div>

  <div class="row">

  <div class="row">
    <span class="label">Bank</span>

    <span class="label">Time</span>
    <span class="value" id="time">-</span>

    <span class="value" id="ref" style="font-size:11px">-</span>

  <button class="btn" onclick="speakReceipt()">
    <svg fill="currentColor" viewBox="0 0 20 20"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415A3.984 3.984 0 0013 10a3.983 0 00-1.172-2.828 1 1 0 010-1.415z"/></svg>
    Play Voice Receipt

<div class="card">

  Check Balance via Voice
</button>
<button class="btn btn-secondary" onclick="window.location.href='./index.html'">
  <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>
  New Payment
</button>
<button class="btn btn-secondary" onclick="logout()">Logout</button>

<div class="footer">
  <div class="voice-active" style="margin-bottom:12px">
    <svg fill="currentColor" viewBox="0 0 20 20"><path d="M7 4a3 3 0 016 0v6a3 3 0 11-6 0V4z"/><path d="M5.5 9.5a.5.5 0 01.5.5v1a4 4 0 004 4h.01a4 4 0 004-4v-1a.5.5 0 011 0v1a5 5 0 01-4.5 4.975V18h1a.5.5 0 010 1h-3a.5.5 0 010-1h1v-2.025A5 5 0 015 11v-1a.5.5 0 01.5-.5z"/></svg>
    Voice Biometrics Active
  </div>
  Secured by Opay
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, query, where, orderBy, limit, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCv8Wz-zkn-Xt5yNO4j8opEeMwsOGCCv_8",
  authDomain: "harps-voicepay.firebaseapp.com",
  projectId: "harps-voicepay",
  storageBucket: "harps-voicepay.firebasestorage.app",
  messagingSenderId: "434033801758",
  appId: "1:434033801758:web:75833560ce9160c3f50c0f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const BACKEND_URL = 'https://harps-voicepay.onrender.com';

let availableVoices = [];
let currentUser = null;
let currentUserData = null;
let voicesLoaded = false;

// BULLETPROOF VOICE LOADING - FIXES CHROME MALE VOICE
async function waitForVoices() {
  return new Promise((resolve) => {
    if (voicesLoaded && speechSynthesis.getVoices().length > 0) {
      resolve();
      return;
    }
    
    const checkVoices = () => {
      const voices = speechSynthesis.getVoices();
      if (voices.length > 0) {
        availableVoices = voices;
        voicesLoaded = true;
        console.log('Voices loaded:', voices.filter(v => v.lang.startsWith('en')).map(v => v.name));
        resolve();
      }
    };
    
    speechSynthesis.onvoiceschanged = checkVoices;
    checkVoices();
    
    // Chrome needs this nudge
    if (speechSynthesis.getVoices().length === 0) {
      speechSynthesis.speak(new SpeechSynthesisUtterance(''));
    }
    
    setTimeout(resolve, 1000);
  });
}

// FORCE WOMAN VOICE ONLY - NO MALE FALLBACK
async function speakHarps(text, language = 'en') {
  await waitForVoices();
  speechSynthesis.cancel();
  
  return new Promise((resolve) => {
    setTimeout(() => {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-NG';
      
      // STRICT FEMALE NAMES ONLY
      const FEMALE_NAMES = [
        'Google UK English Female',
        'Samantha',
        'Victoria',
        'Karen',
        'Tessa',
        'Moira',
        'Fiona'
      ];
      
      let femaleVoice = null;
      
      // Check exact female names first
      for (let name of FEMALE_NAMES) {
        femaleVoice = availableVoices.find(v => v.name === name);
        if (femaleVoice) break;
      }
      
      // Any voice with "Female" but NOT "Male"
      if (!femaleVoice) {
        femaleVoice = availableVoices.find(v => 
          v.name.toLowerCase().includes('female') &&!v.name.toLowerCase().includes('male')
        );
      }
      
      // Nigerian - but exclude male names
      if (!femaleVoice) {
        femaleVoice = availableVoices.find(v => 
          v.lang === 'en-NG' && 
         !v.name.toLowerCase().includes('male') &&
         !v.name.toLowerCase().includes('david')
        );
      }
      
      if (femaleVoice) {
        utterance.voice = femaleVoice;
        console.log('FORCED FEMALE VOICE:', femaleVoice.name);
      }
      
      // MAXIMUM FEMININE SETTINGS
      utterance.pitch = 1.25;
      utterance.rate = 0.82;
      utterance.volume = 1;
      
      utterance.onend = resolve;
      utterance.onerror = resolve;
      speechSynthesis.speak(utterance);
    }, 100);
  });
}

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = './login.html';
    return;
  }
  
  currentUser = user;
  await waitForVoices();
  
  // Get username from Firestore
  try {
    const userDoc = await getDoc(doc(db, 'users', user.uid));
    if (userDoc.exists()) {
      currentUserData = userDoc.data();
      document.getElementById('userName').innerText = currentUserData.displayName || user.email.split('@')[0];
      
      if (currentUserData.isStudent) {
        document.getElementById('studentBadgeDash').style.display = 'inline-flex';
      }
      
      await speakHarps(`Welcome back, ${currentUserData.displayName || 'User'}. Your dashboard is ready.`, 'en');
    } else {
      document.getElementById('userName').innerText = user.email.split('@')[0];
    }
  } catch (e) {
    console.error('Error loading user:', e);
    document.getElementById('userName').innerText = user.email.split('@')[0];
  }
  
  await loadHistoryFromFirestore(user.uid);
  
  // Check for receipt from mock-opay
  const receipt = JSON.parse(localStorage.getItem('receipt') || 'null');
  if (receipt) {
    await displayReceipt(receipt);
    localStorage.removeItem('receipt');
  }
});

// SAVE TO FIRESTORE
async function saveToFirestore(receipt, uid) {
  try {
    await addDoc(collection(db, 'transactions'), {
    ...receipt,
      userId: uid,
      createdAt: serverTimestamp()
    });
  } catch (e) {
    console.error('Error saving transaction:', e);
  }
}

// LOAD HISTORY - HANDLES MISSING INDEX GRACEFULLY
async function loadHistoryFromFirestore(uid) {
  const list = document.getElementById('historyList');
  
  try {
    let querySnapshot;
    
    // Try with orderBy first - requires index
    try {
      const q = query(
        collection(db, 'transactions'),
        where('userId', '==', uid),
        orderBy('createdAt', 'desc'),
        limit(5)
      );
      querySnapshot = await getDocs(q);
    } catch (indexErr) {
      // Fallback: query without orderBy if index missing
      console.warn('Firestore index missing. Using fallback query. Create index in Firebase Console.');
      const q = query(
        collection(db, 'transactions'),
        where('userId', '==', uid),
        limit(20)
      );
      querySnapshot = await getDocs(q);
    }
    
    if (querySnapshot.empty) {
      list.innerHTML = '<div class="empty">No transactions yet. Make your first voice payment!</div>';
      return;
    }
    
    let history = [];
    querySnapshot.forEach((doc) => {
      history.push({ id: doc.id,...doc.data() });
    });
    
    // Sort manually by createdAt if orderBy failed
    history.sort((a, b) => {
      const aTime = a.createdAt?.toMillis? a.createdAt.toMillis() : new Date(a.date || 0).getTime();
      const bTime = b.createdAt?.toMillis? b.createdAt.toMillis() : new Date(b.date || 0).getTime();
      return bTime - aTime;
    });
    
    list.innerHTML = history.slice(0, 5).map(tx => `
      <div class="history-item">
        <div class="history-left">
          <div class="history-icon">💸</div>
          <div class="history-details">
            <h4>${tx.recipient}</h4>
            <p>${tx.bank || 'Opay'} • ${tx.intent || 'transfer'}</p>
          </div>
        </div>
        <div class="history-amount">
          <div class="amount">₦${(tx.amount / 100).toLocaleString()}</div>
          <div class="time">${timeAgo(tx.date || tx.createdAt?.toDate())}</div>
        </div>
      </div>
    `).join('');
    
  } catch (e) {
    console.error('Error loading history:', e);
    list.innerHTML = '<div class="empty">Error loading transactions. Check Firestore indexes in Firebase Console.</div>';
  }
}

async function displayReceipt(receipt) {
  document.getElementById('receiptCard').style.display = 'block';
  document.getElementById('amount').innerText = '₦' + (receipt.amount / 100).toLocaleString();
  document.getElementById('recipient').innerText = receipt.recipient || '-';
  document.getElementById('bank').innerText = receipt.bank || 'Opay';
  document.getElementById('time').innerText = timeAgo(receipt.date);
  document.getElementById('ref').innerText = receipt.reference || receipt.txnId || '-';
  
  if (currentUser) {
    await saveToFirestore(receipt, currentUser.uid);
    await loadHistoryFromFirestore(currentUser.uid);
  }
  
  try {
    const res = await fetch(BACKEND_URL + '/generate-receipt', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        amount: receipt.amount / 100,
        recipient: receipt.recipient,
        language: 'en'
      })
    });
    const data = await res.json();
    const text = data.voice_text || `Sent ₦${receipt.amount / 100} to ${receipt.recipient}. Payment completed.`;
    document.getElementById('voiceText').innerText = `"${text}"`;
  } catch {
    document.getElementById('voiceText').innerText = `"Payment of ₦${receipt.amount / 100} to ${receipt.recipient} completed."`;
  }
}

function timeAgo(timestamp) {
  if (!timestamp) return 'Just now';
  const date = timestamp instanceof Date? timestamp : new Date(timestamp);
  const seconds = Math.floor((Date.now() - date.getTime()) / 1000);
  if (seconds < 60) return 'Just now';
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return `${minutes}m ago`;
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return `${hours}h ago`;
  const days = Math.floor(hours / 24);
  return `${days}d ago`;
}

window.speakReceipt = async function() {
  const text = document.getElementById('voiceText').innerText.replace(/"/g,'');
  await speakHarps(text, 'en');
}

window.checkBalance = async function() {
  const text = "To check your real Opay balance, please open your Opay app. I don't have access to your account balance.";
  await speakHarps(text, 'en');
}
