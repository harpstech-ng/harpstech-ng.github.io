<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harps Tech Pay Team | VoicePay Login</title>

<!-- PWA Tags - Added -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00D084">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="logo.png">

<style>
:root{
  --green:#00D084;
  --bg:#0a0a0a;
  --card:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:radial-gradient(1200px 800px at 50% -10%, rgba(0,208,132,0.15), transparent 50%), #0a0a0a;
  color:white;
  font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px
}
.card{
  background:var(--card);
  backdrop-filter:blur(24px);
  border:1px solid var(--border);
  padding:36px 28px;
  border-radius:24px;
  width:100%;
  max-width:420px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.brand{
  text-align:center;
  margin-bottom:20px;
}
.logo{
  width:72px;
  height:72px;
  margin:0 auto 12px;
  display:block;
  border-radius:18px;
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:5px 12px;
  border-radius:999px;
  background:rgba(0,208,132,0.12);
  color:var(--green);
  font-size:12px;
  font-weight:600;
  margin-bottom:10px;
}
.badge svg{width:14px;height:14px}
h2{
  font-size:24px;
  font-weight:700;
  margin-bottom:6px;
}
.sub{
  color:#a8a8a8;
  font-size:14px;
  margin-bottom:6px;
}
.sub-bio{
  color:#00D084;
  font-size:13px;
  font-weight:500;
  margin-bottom:20px;
}
input{
  width:100%;
  padding:14px 16px;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.06);
  color:white;
  font-size:16px;
  outline:none;
  transition:0.2s;
}
input:focus{
  border-color:var(--green);
  background:rgba(255,255,255,0.08);
}
.input-group{position:relative;margin-bottom:14px}
.eye-btn{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  background:none;
  border:none;
  color:#aaa;
  font-size:18px;
  cursor:pointer;
  padding:4px;
}
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:var(--green);
  color:#0a0a0a;
  font-weight:700;
  font-size:16px;
  margin-top:6px;
  cursor:pointer;
  transition:transform 0.08s ease;
}
.btn:active{transform:scale(0.98)}
.link{
  color:var(--green);
  font-size:14px;
  margin-top:14px;
  display:inline-block;
  text-decoration:none;
}
.toggle{
  margin-top:20px;
  font-size:14px;
  color:#aaa;
  text-align:center;
}
.toggle span{
  color:var(--green);
  cursor:pointer;
  font-weight:600;
}
.footer{
  margin-top:24px;
  text-align:center;
  font-size:12px;
  color:#666;
}
.footer .security{
  display:inline-flex;
  align-items:center;
  gap:6px;
  color:#888;
  margin-bottom:6px;
}
.footer .security svg{width:14px;height:14px}
.error,.success{
  padding:12px;
  border-radius:10px;
  margin-bottom:14px;
  font-size:14px;
  display:none
}
.error{background:rgba(255,59,48,0.18);border:1px solid #ff3b30}
.success{background:rgba(0,208,132,0.18);border:1px solid var(--green)}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <img src="logo.png" class="logo" alt="Harps Tech Logo" onerror="this.style.display='none'">
    <span class="badge">
      <svg fill="currentColor" viewBox="0 0 20 20"><path d="M10 2L3 7v11a1 1 0 001 1h12a1 1 0 001-1V7l-7-5zM8 15V9h4v6H8z"/></svg>
      Powered by Opay
    </span>
    <h2 id="title">Harps VoicePay</h2>
    <p class="sub" id="subtitle">Speak to send money, fast and secure</p>
    <p class="sub-bio">Voice-authenticated login for maximum security</p>
  </div>
  
  <div class="error" id="error"></div>
  <div class="success" id="success"></div>
  
  <input type="email" id="email" placeholder="Email" autocomplete="email">
  <div class="input-group" id="passGroup">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    <button type="button" class="eye-btn" onclick="togglePass()" id="eyeBtn">👁️</button>
  </div>
  
  <button class="btn" id="mainBtn" onclick="handleAuth()">Login</button>
  <a href="#" class="link" onclick="forgotPass()">Forgot Password?</a>
  
  <div class="toggle">
    <span id="toggleText">Don't have an account? </span>
    <span onclick="toggleMode()">Sign Up</span>
  </div>

  <div class="footer">
    <div class="security">
      <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
      Bank-grade 256-bit AES encryption
    </div>
    <div>Harps Tech Pay Team</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// Your Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCv8Wz-zkn-Xt5yNO4j8opEeMwsOGCCv_8",
  authDomain: "harps-voicepay.firebaseapp.com",
  projectId: "harps-voicepay",
  storageBucket: "harps-voicepay.firebasestorage.app",
  messagingSenderId: "434033801758",
  appId: "1:434033801758:web:75833560ce9160c3f50c0f",
  measurementId: "G-47WZZXQNGC"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
let isLogin = true;
let showPassword = false;

window.toggleMode = () => {
  isLogin = !isLogin;
  document.getElementById('title').innerText = isLogin ? 'Harps VoicePay' : 'Create Account';
  document.getElementById('subtitle').innerText = isLogin ? 'Speak to send money, fast and secure' : 'Join Harps VoicePay powered by Opay';
  document.getElementById('mainBtn').innerText = isLogin ? 'Login' : 'Sign Up';
  document.getElementById('toggleText').innerText = isLogin ? "Don't have an account? " : "Already have an account? ";
};

window.togglePass = () => {
  showPassword = !showPassword;
  const p = document.getElementById('password');
  const btn = document.getElementById('eyeBtn');
  p.type = showPassword ? 'text' : 'password';
  btn.textContent = showPassword ? '🙈' : '👁️';
};

window.forgotPass = () => {
  document.getElementById('passGroup').style.display = 'none';
  document.getElementById('mainBtn').innerText = 'Send Reset Link';
  document.getElementById('mainBtn').onclick = resetPass;
  document.getElementById('subtitle').innerText = 'Enter your email to reset password';
};

window.handleAuth = async () => {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value;
  if(!email || !pass){ showError('Please fill all fields'); return }
  
  try{
    clearMsg();
    if(isLogin){
      const user = await signInWithEmailAndPassword(auth,email,pass);
      localStorage.setItem('uid',user.user.uid);
      window.location.href='/index.html';
    }else{
      await createUserWithEmailAndPassword(auth,email,pass);
      showSuccess('Account created! You can login now');
      toggleMode();
    }
  }catch(e){
    showError(e.message.replace('Firebase: ', ''));
  }
};

window.resetPass = async () => {
  const email = document.getElementById('email').value.trim();
  if(!email){ showError('Enter your email first'); return }
  try{
    await sendPasswordResetEmail(auth,email);
    showSuccess('Reset link sent! Check your email');
    setTimeout(()=>location.reload(),2000);
  }catch(e){
    showError(e.message.replace('Firebase: ', ''));
  }
};

function showError(msg){
  document.getElementById('error').innerText=msg;
  document.getElementById('error').style.display='block';
  document.getElementById('success').style.display='none';
}
function showSuccess(msg){
  document.getElementById('success').innerText=msg;
  document.getElementById('success').style.display='block';
  document.getElementById('error').style.display='none';
}
function clearMsg(){
  document.getElementById('error').style.display='none';
  document.getElementById('success').style.display='none';
}
</script>

<!-- Service Worker Registration - Added -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js');
  });
}
</script>
</body>
</html>
