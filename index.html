<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harps VoicePay | Speak to Pay</title>

<!-- PWA Tags -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00D084">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="logo.png">

<style>
:root{
  --green:#00D084;
  --bg:#0a0a0a;
  --card:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:radial-gradient(1200px 800px at 50% -20%, rgba(0,208,132,0.18), transparent 50%), #0a0a0a;
  color:white;
  font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:30px 20px;
}
.top-bar{
  position:absolute;
  top:20px;
  left:0;
  right:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 24px;
}
.team{
  font-size:12px;
  color:#666;
  font-weight:500;
}
.logout{
  background:rgba(255,255,255,0.08);
  border:1px solid var(--border);
  color:white;
  padding:8px 14px;
  border-radius:10px;
  font-size:13px;
  cursor:pointer;
}
.container{
  text-align:center;
  max-width:420px;
  width:100%;
}
.logo{
  width:80px;
  height:80px;
  margin:0 auto 16px;
  display:block;
  border-radius:20px;
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:5px 12px;
  border-radius:999px;
  background:rgba(0,208,132,0.12);
  color:var(--green);
  font-size:12px;
  font-weight:600;
  margin-bottom:16px;
}
.badge svg{width:14px;height:14px}
h1{
  font-size:32px;
  font-weight:700;
  margin-bottom:8px;
}
.sub{
  color:#a8a8a8;
  font-size:15px;
  margin-bottom:6px;
}
.bio{
  color:var(--green);
  font-size:13px;
  font-weight:500;
  margin-bottom:40px;
}
.mic-wrap{
  position:relative;
  display:inline-block;
}
.mic-btn{
  width:160px;
  height:160px;
  border-radius:50%;
  background:linear-gradient(135deg, #00D084, #00a866);
  border:none;
  font-size:60px;
  cursor:pointer;
  box-shadow:0 0 60px rgba(0,208,132,0.4);
  transition:transform 0.15s ease;
}
.mic-btn:active{transform:scale(0.95)}
.mic-btn.recording{
  background:linear-gradient(135deg, #ff3b30, #d62828);
  animation:pulse 1.2s infinite;
}
@keyframes pulse{
 0%,100%{box-shadow:0 0 40px rgba(255,59,48,0.5)}
 50%{box-shadow:0 0 80px rgba(255,59,48,0.8)}
}
.hint{
  margin-top:24px;
  color:#888;
  font-size:14px;
  font-style:italic;
}
.status{
  margin-top:20px;
  padding:14px;
  border-radius:12px;
  background:var(--card);
  border:1px solid var(--border);
  font-size:14px;
  min-height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.footer{
  margin-top:40px;
  text-align:center;
  font-size:12px;
  color:#666;
}
.footer.security{
  display:inline-flex;
  align-items:center;
  gap:6px;
  color:#888;
  margin-bottom:6px;
}
.footer.security svg{width:14px;height:14px}
</style>
</head>
<body>
<div class="top-bar">
  <div class="team">Harps Tech Pay Team</div>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container">
  <img src="logo.png" class="logo" alt="Harps Tech Logo" onerror="this.style.display='none'">

  <span class="badge">
    <svg fill="currentColor" viewBox="0 0 20 20"><path d="M10 2L3 7v11a1 1 0 001 1h12a1 1 0 001-1V7l-7-5zM8 15V9h4v6H8z"/></svg>
    Powered by Opay
  </span>

  <h1>Speak Your Payment</h1>
  <p class="sub">Voice-authenticated payments powered by Groq AI</p>
  <p class="bio">Tap mic and speak naturally in English, Yoruba, Hausa, or Pidgin</p>

  <div class="mic-wrap">
    <button class="mic-btn" id="mic">🎤</button>
  </div>

  <p class="hint">"Send 5k to Seyi" • "Buy 2k airtime" • "Pay NEPA bill"</p>
  <div class="status" id="status">Tap the mic to start</div>

  <div class="footer">
    <div class="security">
      <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
      Bank-grade 256-bit AES encryption
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCv8Wz-zkn-Xt5yNO4j8opEeMwsOGCCv_8",
  authDomain: "harps-voicepay.firebaseapp.com",
  projectId: "harps-voicepay",
  storageBucket: "harps-voicepay.firebasestorage.app",
  messagingSenderId: "434033801758",
  appId: "1:434033801758:web:75833560ce9160c3f50c0f",
  measurementId: "G-47WZZXQNGC"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Render backend URL
const BACKEND_URL = 'https://harps-voicepay.onrender.com';

const mic = document.getElementById('mic');
const status = document.getElementById('status');

// Auth check
onAuthStateChanged(auth, (user) => {
  if (!user) window.location.href = '/login.html';
  else localStorage.setItem('uid', user.uid);
});

// Voice TTS function - Nigerian male voice
function speakHarps(text, language = 'en') {
  return new Promise((resolve) => {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = language === 'yo'? 'yo-NG' : language === 'ha'? 'ha-NG' : language === 'ig'? 'ig-NG' : 'en-NG';
    utterance.pitch = 0.8; // Male voice
    utterance.rate = 0.95; // Natural speed
    utterance.volume = 1;
    utterance.onend = resolve;
    speechSynthesis.speak(utterance);
  });
}

// Check saved recipients
function getSavedRecipient(name) {
  const saved = JSON.parse(localStorage.getItem('harps_recipients') || '{}');
  return saved[name.toLowerCase()];
}

function saveRecipient(name, bank, accountNumber) {
  const saved = JSON.parse(localStorage.getItem('harps_recipients') || '{}');
  saved[name.toLowerCase()] = { bank, accountNumber };
  localStorage.setItem('harps_recipients', JSON.stringify(saved));
}

// Speech recognition setup
let recognition;
if('webkitSpeechRecognition' in window || 'SpeechRecognition' in window){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'en-NG';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    mic.classList.add('recording');
    status.innerText = 'Listening... Speak now';
  };

  recognition.onresult = async (e) => {
    const text = e.results[0][0].transcript;
    status.innerText = `Processing: "${text}"`;
    mic.classList.remove('recording');

    try{
      // Step 1: Parse intent
      const res = await fetch(BACKEND_URL + '/parse', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({transcript:text})
      });
      const data = await res.json();

      // Step 2: Check if recipient exists in saved list
      if (data.intent === 'transfer' && data.recipient) {
        const savedRecipient = getSavedRecipient(data.recipient);
        if (savedRecipient) {
          data.recipient_bank = savedRecipient.bank;
          data.recipient_account = savedRecipient.accountNumber;
          status.innerText = `Found saved: ${data.recipient} - ${savedRecipient.bank}`;
        }
      }

      // Step 3: Get Harps voice response
      const speakRes = await fetch(BACKEND_URL + '/speak', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          text: text,
          language: data.language_detected
        })
      });
      const voiceData = await speakRes.json();

      // Step 4: Speak it out loud
      status.innerText = voiceData.voice_text;
      await speakHarps(voiceData.voice_text, data.language_detected);

      // Step 5: Save intent and go to flow
      localStorage.setItem('intent', JSON.stringify(data));
      localStorage.setItem('last_transcript', text);
      window.location.href = '/flow.html';

    }catch(err){
      status.innerText = 'Error connecting to server. Try again.';
      await speakHarps('Sorry, network error. Try again.', 'en');
      mic.classList.remove('recording');
    }
  };

  recognition.onerror = (e) => {
    status.innerText = 'Mic error: ' + e.error;
    mic.classList.remove('recording');
  };

  recognition.onend = () => {
    mic.classList.remove('recording');
  };
}

mic.onclick = () => {
  if(!recognition){
    alert('Voice input not supported. Use Safari on iPhone or Chrome on Android.');
    return;
  }
  speechSynthesis.cancel(); // Stop any current speech
  recognition.start();
};

window.logout = async () => {
  await signOut(auth);
  localStorage.clear();
  window.location.href = '/login.html';
};
</script>

<!-- Service Worker Registration -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js');
  });
}
</script>
</body>
</html>
